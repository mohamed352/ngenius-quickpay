<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Cancelled — QuickPay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #000000;
      --bg-card: #111111;
      --border: #333333;
      --text-primary: #ffffff;
      --text-secondary: #aaaaaa;
      --radius: 8px;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 440px;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 48px 32px;
      text-align: center;
    }

    .icon {
      font-size: 40px;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .btn {
      display: inline-block;
      width: 100%;
      padding: 16px 24px;
      background: #ffffff;
      color: #000000;
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-radius: 4px;
      transition: background 0.2s;
    }

    .btn:hover { background: #e0e0e0; }

    .brand {
      margin-top: 32px;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #ffffff;
    }

    @media (max-width: 480px) {
      .card { padding: 36px 20px; }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">
      <div class="icon">✕</div>

      <h1>Payment Cancelled</h1>
      <p class="subtitle">
        Your payment was not completed.<br />
        No charges have been made.
      </p>

      <a href="/" class="btn" id="retryLink">Try Again</a>

      <div class="brand">QuickPay</div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const order = params.get('order');
    if (order) {
      const retryLink = document.getElementById('retryLink');
      retryLink.href = `/?order=${encodeURIComponent(order)}`;
    }
  </script>
</body>
</html>
