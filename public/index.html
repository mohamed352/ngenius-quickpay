<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuickPay — Secure Payment</title>
  <meta name="description" content="Complete your payment securely via NGenius." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ===== Reset & Base ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #000000;
      --bg-card: #111111;
      --border: #333333;
      --border-focus: #ffffff;
      --text-primary: #ffffff;
      --text-secondary: #aaaaaa;
      --text-muted: #777777;
      --accent: #ffffff;
      --error: #ff4444;
      --radius: 8px;
      --radius-sm: 4px;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 440px;
    }

    /* ===== Brand Header ===== */
    .brand {
      text-align: center;
      margin-bottom: 32px;
    }

    .brand-name {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -1px;
    }

    .brand-tagline {
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-top: 4px;
    }

    /* ===== Card ===== */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 28px;
    }

    .card-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }

    .card-subtitle {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 28px;
    }

    /* ===== Form ===== */
    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .form-input {
      width: 100%;
      padding: 14px 16px;
      background: #000000;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 15px;
      font-family: var(--font);
      transition: all 0.2s ease;
      outline: none;
    }

    .form-input::placeholder { color: var(--text-muted); }
    .form-input:hover { border-color: #555555; }
    .form-input:focus { border-color: var(--border-focus); }

    .amount-wrapper { position: relative; }

    .amount-wrapper .currency-badge {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 13px;
      font-weight: 600;
      color: #000000;
      background: #ffffff;
      padding: 4px 8px;
      border-radius: 4px;
    }

    .amount-wrapper .form-input {
      padding-right: 70px;
      font-size: 20px;
      font-weight: 600;
    }

    /* ===== Pay Button ===== */
    .pay-btn {
      width: 100%;
      padding: 16px 24px;
      margin-top: 12px;
      background: #ffffff;
      border: 1px solid #ffffff;
      border-radius: var(--radius-sm);
      color: #000000;
      font-size: 15px;
      font-weight: 700;
      font-family: var(--font);
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
    }

    .pay-btn:hover:not(:disabled) {
      background: #e0e0e0;
      border-color: #e0e0e0;
    }

    .pay-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .pay-btn .btn-text {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: opacity 0.2s;
    }

    .pay-btn.loading .btn-text { opacity: 0; }

    .pay-btn .spinner {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 20px;
      height: 20px;
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: #000000;
      border-radius: 50%;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .pay-btn.loading .spinner {
      opacity: 1;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    /* ===== Error Message ===== */
    .error-msg {
      display: none;
      margin-top: 16px;
      padding: 12px 16px;
      background: rgba(255,68,68,0.1);
      border: 1px solid rgba(255,68,68,0.3);
      border-radius: var(--radius-sm);
      color: var(--error);
      font-size: 13px;
    }

    .error-msg.visible { display: block; }

    /* ===== Security Footer ===== */
    .security-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 24px;
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .security-badge svg {
      width: 12px;
      height: 12px;
      fill: currentColor;
    }

    /* ===== Payment Methods ===== */
    .payment-methods {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-top: 32px;
    }

    .payment-methods span {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .pm-icons {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .pm-icon {
      font-size: 11px;
      font-weight: 700;
      color: #ffffff;
      opacity: 0.6;
    }

    /* ===== Footer ===== */
    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* ===== Responsive ===== */
    @media (max-width: 480px) {
      body { padding: 16px; }
      .card { padding: 24px 20px; }
    }
  </style>
</head>

<body>
  <div class="container">
    <!-- Brand Header -->
    <div class="brand">
      <div class="brand-name">QuickPay</div>
      <p class="brand-tagline">Secure Checkout</p>
    </div>

    <!-- Payment Card -->
    <div class="card">
      <h1 class="card-title">Payment Amount</h1>
      <p class="card-subtitle">Enter the amount and proceed to pay securely</p>

      <form id="paymentForm" novalidate>
        <!-- Amount -->
        <div class="form-group">
          <label class="form-label" for="amount">Amount</label>
          <div class="amount-wrapper">
            <input
              type="number"
              id="amount"
              class="form-input"
              placeholder="0.00"
              min="0.01"
              step="0.01"
              required
              inputmode="decimal"
            />
            <div class="currency-badge">SAR</div>
          </div>
        </div>

        <!-- Pay Button -->
        <button type="submit" class="pay-btn" id="payBtn">
          <span class="btn-text">Proceed to Payment →</span>
          <div class="spinner"></div>
        </button>

        <!-- Error Message -->
        <div class="error-msg" id="errorMsg"></div>
      </form>

      <!-- Security Badge -->
      <div class="security-badge">
        <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
        Secured by NGenius · 256-bit SSL
      </div>
    </div>

    <!-- Payment Methods -->
    <div class="payment-methods">
      <span>Accepted Methods</span>
      <div class="pm-icons">
        <div class="pm-icon">VISA</div>
        <div class="pm-icon">MC</div>
        <div class="pm-icon">MADA</div>
        <div class="pm-icon">APPLE PAY</div>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      © 2026 QuickPay · Powered by NGenius
    </div>
  </div>

  <script>
    const form = document.getElementById('paymentForm');
    const payBtn = document.getElementById('payBtn');
    const errorMsg = document.getElementById('errorMsg');

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('visible');
    }

    function hideError() {
      errorMsg.classList.remove('visible');
    }

    function setLoading(loading) {
      payBtn.classList.toggle('loading', loading);
      payBtn.disabled = loading;
    }

    // Pre-fill amount from URL if provided
    const params = new URLSearchParams(window.location.search);
    if (params.get('amount')) {
      document.getElementById('amount').value = params.get('amount');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      const amount = document.getElementById('amount').value.trim();
      const orderNumber = params.get('order') || '';

      if (!amount || parseFloat(amount) <= 0) {
        showError('Please enter a valid payment amount.');
        return;
      }

      setLoading(true);

      try {
        const res = await fetch('/api/create-payment', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ amount, orderNumber }),
        });

        const data = await res.json();

        if (data.success && data.redirect_url) {
          window.location.href = data.redirect_url;
        } else {
          showError(data.error || 'Something went wrong. Please try again.');
          setLoading(false);
        }
      } catch (err) {
        showError('Network error. Please check your connection and try again.');
        setLoading(false);
      }
    });
  </script>
</body>
</html>
